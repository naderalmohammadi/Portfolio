name: Deploy to GitHub Pages
# Updated: 2026-04-23

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npm run build
      - run: cp CNAME out/ || true
      - run: ls -la out && find out -maxdepth 2 -type f | sort | head -20
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
