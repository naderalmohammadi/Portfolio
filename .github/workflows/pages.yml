name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefer-offline --no-audit --progress=false
      - run: npm run build
      - run: ls -la out
      - run: find out -maxdepth 2 -type f | sort | head -20
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: out
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: .
      - uses: actions/configure-pages@v3
      - uses: actions/deploy-pages@v1
